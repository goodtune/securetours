name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-align:
    name: Build + alignment harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install harness dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run alignment harness
        run: python -m pytest tests/ -q
        env:
          # dist/ was built above; don't rebuild inside the fixture.
          ALIGN_SKIP_BUILD: '1'
