<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Secure Tours & Travel</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
      padding: 2rem;
      text-align: center;
    }
    .error-content { max-width: 520px; }
    .error-code {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.5rem;
      opacity: 0.6;
    }
    .error-content h1 { color: var(--white); margin-bottom: 1rem; }
    .error-content p { color: rgba(255,255,255,0.7); margin-bottom: 2rem; }
    .error-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have moved. Return to our home page to continue.</p>
      <div class="error-actions">
        <a href="/index.html" class="btn btn--primary">Back to Home</a>
        <a href="/contact.html" class="btn btn--outline">Contact Us</a>
      </div>
    </div>
  </div>
</body>
</html>
