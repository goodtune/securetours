# Secure Tours & Travel — Zensical configuration
# All settings live under [project] — Zensical strips the outer key on load.

[project]
site_name    = "Secure Tours & Travel"
site_description = "Secure Luxury Travel for Discerning Individuals & Groups — the dedicated tourism and event services division of Australian Frontline Solutions."
site_url     = "https://securetours.com.au"
copyright    = "© 2026 Secure Tours & Travel. All rights reserved."
docs_dir     = "docs"
site_dir     = "site"
extra_css    = ["stylesheets/extra.css"]

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------

[project.theme]
logo       = "assets/logo-transparent.png"
favicon    = "assets/favicon.svg"
custom_dir = "overrides"

[project.theme.palette]
scheme  = "default"
primary = "custom"
accent  = "custom"

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = false
