  sub: 'Founder & Director of REES INTERNATIONAL — endorsing Secure Tours & Travel and AFS Group for outstanding work practices and industry leadership at the Australian Tourism Exchange and beyond.'

context:
  title: 'About this endorsement'
  body: 'Janene Rees is the Founder & Director of REES INTERNATIONAL, an international tourism industry firm. Janene has witnessed Secure Tours & Travel and AFS Group operate firsthand at major industry events including the Australian Tourism Exchange (ATE), where the business has showcased its services to international tourism agents. She has also engaged AFS Group for professional Security Risk Assessments on behalf of a major entertainment and sporting facility client.'

letter:
  avatar: 'J'
  author_name: 'Janene Rees'
  author_title: 'Founder & Director — REES INTERNATIONAL'
  date: '23 August 2018'
  paragraphs:
    - 'To whom it may concern,'
    - 'It gives me great pleasure to endorse Secure Tours and Travel and sister company AFS for its outstanding work practices and I believe them to be one of the best in their field.'
    - 'I have known this company for several years and have witnessed firsthand their professionalism throughout the industry particularly at Major International trade shows such as Australian Tourism Exchange. At this event Secure Tours and Travel showcase their company to International Tourism agents and have always displayed their company excellently.'
    - 'Secure Tours and Travel have also provided one of my clients, which is a very large entertainment/sporting facility with Security Risk Assessments, the work they carried out was of a very high standard and the client was very happy with all work done.'
    - 'I wish Secure Tours and Travel much success in gaining international recognition for all the services that they provide and believe that as they are a very well established business they are very equipped to grow their business into these new emerging International Markets.'
  salutation_lines:
    - 'Janene Rees'
    - 'Founder & Director'
    - 'REES INTERNATIONAL'

