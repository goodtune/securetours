meta:
  title: 'Event Solutions — Secure Tours & Travel'
  description: 'Professional event management with licensed security personnel embedded at every level. Corporate functions, sporting events, concerts, film & TV production, group travel and conference support across Australia.'

hero:
  label: 'Corporate · Sporting · Entertainment · Film & TV · Group'
  title: 'Event Solutions'
  sub: 'From intimate corporate functions to large-scale sporting spectacles and major film productions — AFS Group brings licensed security expertise, crowd management experience and white-glove hospitality to every event we support.'

lead:
  label: 'Our Capability'
  title: 'Security-First Event Management'
  lead: 'Secure Tours & Travel, as part of the Australian Frontline Solutions (AFS) Group, brings over 37 years of operational security and event management experience to every brief we accept. Our teams are not an add-on to your event — they are embedded within it.'
  paragraphs:
    - 'Whether you are managing a delegation of corporate guests at a major sporting final, protecting a headline act on a national tour, coordinating the safe movement of hundreds of conference delegates across a city, or providing on-set security for a major film or television production, our licensed personnel provide the operational backbone your event demands.'
    - 'We operate nationally, with established capabilities across NSW, QLD and VIC, and access to partner networks for international assignments.'
  cta_label: 'Discuss Your Event'
  credentials:
    title: 'AFS Group Credentials'
    items:
      - 'Security Master Licence holder — licensed operator'
      - 'Established 1989 — 37 years of operational experience'
      - 'National footprint: NSW · QLD · VIC'
      - 'Licensed crowd controllers and close protection officers'
      - 'Risk assessment and event safety planning'
      - 'Multilingual personnel — English, Mandarin and more'
      - '24/7 operational support and incident management'
      - 'Integrated transport and logistics coordination'
      - 'STAT Accreditation — independent safety and security assessment'
      - 'Medics + First Aid coordination on-site'
      - 'COVID compliance protocols available'

offerings:
  label: 'What We Deliver'
  title: 'Event Service Offerings'
  intro: 'Our event solutions span the full spectrum — from intimate executive functions requiring discreet protection to mass-attendance public events requiring full crowd and access management.'
  events:
    - icon: '🏢'
      title: 'Corporate Events & Functions'
      body: 'Board meetings, investor presentations, product launches and gala dinners. Discreet security presence, executive guest management, VIP arrival coordination and confidential protocol compliance for high-value corporate gatherings. Our personnel understand the discretion expected in high-stakes corporate environments.'
    - icon: '🏟️'
      title: 'Sporting Events'
      body: 'From national league fixtures to major international sporting tournaments, our teams manage crowd flow, VIP access control, athlete and official escort, and post-event egress. Experienced across football, rugby, cricket, tennis and aquatic events. We coordinate with venue operators to deliver seamless, safe sporting environments.'
    - icon: '🎵'
      title: 'Concerts & Live Entertainment'
      body: 'Venue security, backstage access management, artist transfer coordination and fan safety protocols for live music events, festivals and theatre productions. We work with touring production companies and venue operators to deliver safe, seamless events — protecting talent, crew and audiences alike.'
    - icon: '✈️'
      title: 'Group Travel Management'
      body: 'Coordinated secure travel for corporate delegations, sporting teams, school groups and tour parties. End-to-end logistics from departure to return — including airport transfers, accommodation liaisons, multilingual chaperones and real-time incident support. One point of contact, complete accountability.'
    - icon: '🎙️'
      title: 'Conferences & Exhibitions'
      body: 'Badge verification, access control, speaker and delegate protection, sensitive materials handling and emergency response planning for conferences, trade exhibitions and government summits. Scaled to the size and sensitivity of your event. We have supported major international conference delegations across Sydney, Melbourne and Brisbane.'
    - icon: '🎓'
      title: 'School Tours & Group Excursions'
      body: 'S.T.A.G.E. — School Tours And Group Excursions. Specialist support for educational institutions managing large student groups, including risk assessment, licensed chaperones, emergency protocols and transport coordination. Safety embedded at every layer. Our vetted personnel are experienced in managing unaccompanied minors and student cohorts.'
    - icon: '🌟'
      title: 'Public Festivals & Cultural Events'
      body: 'Major public events, cultural festivals, light shows and outdoor spectacles require layered security planning and fluid crowd management. Our teams coordinate access points, manage crowd density, liaise with emergency services and ensure that large public gatherings are safe, orderly and memorable for all the right reasons.'
    - icon: '🏛️'
      title: 'Government & Diplomatic Events'
      body: 'Protocol management, close personal protection, secure transport and access control for government functions, diplomatic receptions and high-profile official visits. Our teams understand the sensitivities involved and operate with the highest levels of discretion, coordinating with official agencies as required.'
    - icon: '🚤'
      title: 'Marine & Waterfront Events'
      body: 'Waterfront events, vessel charters and harbour events present unique security and logistics challenges. Our teams coordinate marine transfers, vessel boarding security, waterfront perimeter management and VIP access for yacht events, harbour cruises and waterfront functions.'

film_tv:
  label: 'Industry Specialist'
  title: 'Film & Television Security'
  intro: 'AFS Group has established specialist capabilities for the Australian film and television industry — a sector with unique demands around talent security, location access, set protection and media management.'
  panel:
    label: 'Film + TV Specialist'
    title: 'On-Set Security & Production Support'
    paragraphs:
      - 'From single-day shoots to major feature film productions, our licensed security personnel integrate with your production team — managing talent protection, location security, crew safety and unauthorised access prevention. We understand the demands of production schedules and operate to minimise disruption while maintaining a secure working environment.'
      - 'Our Film + TV security team has experience supporting productions across Sydney, regional NSW, and interstate — including location shoots in public spaces, heritage venues, and high-security environments requiring close coordination with local authorities.'
    capabilities:
      - title: 'Talent Protection'
        body: 'Close personal protection for principal cast, directors and high-profile crew. Discreet, professional and production-schedule aware.'
      - title: 'Location Security'
        body: 'Perimeter management, access control and unauthorised entry prevention for location shoots. Coordination with local councils and police where required.'
      - title: 'Set Access Control'
        body: 'Credentialing and access management for cast, crew, contractors and visitors. Ensuring only authorised personnel access restricted areas.'
      - title: 'Media Management'
        body: 'Managing media access and preventing unauthorised photography or filming of talent, sets or pre-release content. Coordinated with your publicity team.'
      - title: 'Equipment & Asset Security'
        body: 'Overnight and transit security for high-value production equipment, props and sensitive materials. Monitored transport and secure storage coordination.'
      - title: 'Production Travel'
        body: 'Secure transport and chaperone services for talent movement between sets, hotels, airports and events. Discreet vehicles and licensed drivers.'
    cta_label: 'Discuss Production Requirements'

