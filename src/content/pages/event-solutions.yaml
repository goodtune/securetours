differentiators:
  label: 'Why Choose AFS'
  title: 'What Sets Our Event Teams Apart'
  items:
    - icon: '🛡️'
      title: 'Licensed Security Embedded in Your Team'
      body: 'Unlike event coordinators who contract security separately, our licensed personnel are integrated into the planning and delivery of your event from day one — not added as an afterthought.'
    - icon: '📋'
      title: 'Formal Risk Assessment — Every Event'
      body: 'Every event begins with a written risk assessment covering venue security, crowd density, access points, medical coverage requirements and emergency egress. Documented, signed and rehearsed before your event begins.'
    - icon: '👥'
      title: 'Crowd Management Expertise'
      body: 'Our crowd controllers are trained in behavioural assessment, de-escalation and emergency response. We design crowd flow to prevent bottlenecks and manage incidents before they escalate to crises.'
    - icon: '🔑'
      title: 'VIP Access Control'
      body: 'Tiered access management for talent, officials, media and sponsors. Our teams coordinate with venue operators to enforce access protocols while ensuring VIP guests receive seamless, dignified service.'
    - icon: '🌐'
      title: 'Multilingual Event Support'
      body: 'For events hosting international guests, delegates or athletes, our multilingual personnel provide direct communication support in English, Mandarin and additional languages — reducing misunderstandings and enhancing guest experience.'
    - icon: '🗺️'
      title: 'National Footprint'
      body: 'Operational capacity across New South Wales, Queensland and Victoria, with access to affiliate networks for events in other states and territories. One point of contact, national reach.'
    - icon: '🏅'
      title: 'STAT Accreditation'
      body: 'Our STAT Accreditation program provides an independent, objective safety and security assessment for tourism and hospitality providers — giving event organisers and international wholesale partners a recognised, standardised risk rating.'
    - icon: '⚕️'
      title: 'Health & Safety Integration'
      body: 'We coordinate medics and first aid provision, work health and safety planning, COVID compliance protocols and emergency medical response as part of our event security brief — not as a separate engagement.'

