meta:
  title: 'Tourism Solutions — Secure Tours & Travel'
  description: 'Explore all specialist solutions from Secure Tours & Travel — inbound tourism, VIP transfers, event management, athlete support, and more.'

hero:
  label: 'Our Tourism Solutions'
  title: 'Tourism Solutions'
  sub: 'Every solution is designed around one principle: your safety, comfort and peace of mind.'

featured:
  tag: 'Flagship Solution · Inbound & Domestic Tourism'
  title: 'Secure Tours & Travel Solutions'
  text: 'Comprehensive, safety-led travel packages for inbound and domestic clients. Chaperoned tours, private transfers and secure ground arrangements across Australia and globally. The foundation of everything we do.'
  cta_label: 'Learn More'
  href: '/services/tours-travel-solutions/'
