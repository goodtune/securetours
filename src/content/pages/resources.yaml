# Resources page copy and the download library. Edited via the CMS (/admin)
# — validated at build time by the schema in src/lib/pages.ts.
# New PDF files are uploaded via the CMS media library (Assets) and land in
# /assets/uploads/; the design PDFs live in /assets/downloads/.
meta:
