testimonials:
  label: 'What Our Clients Say'
  title: 'Testimonials & Endorsements'
  cards:
    - avatar: 'G'
      name: "Gary O'Riordan"
      title: 'Tourism Industry Consultant & Business Advisor'
      badge: 'Endorsement'
      date: '14 August 2018'
      quote: '"Secure Tours & Travel is a niche tour operator offering travel packages and itineraries, planning, coordination and booking services, as well as delivery of ground arrangements in Australia with an overarching focus on luxury, high end experiences and a clear differentiation on safety and security. This type of service offering is new to the Australian market and has good potential with high end travellers such as VIP groups, conference and event attendees, or leisure travellers who are safety and security focused."'
      cta_label: 'Read full endorsement →'
      cta_href: '/articles/gary-oriordan-endorsement/'
    - avatar: 'J'
      name: 'Janene Rees'
      title: 'Founder & Director — REES INTERNATIONAL'
      badge: 'Endorsement'
      date: '23 August 2018'
      quote: '"It gives me great pleasure to endorse Secure Tours and Travel and sister company AFS for its outstanding work practices and I believe them to be one of the best in their field… The work they carried out was of a very high standard and the client was very happy with all work done."'
      cta_label: 'Read full endorsement →'
      cta_href: '/articles/janene-rees-endorsement/'
    - avatar: 'E'
      name: 'Event Producer'
      title: 'Major Public Festival — Sydney'
      badge: 'Venue Feedback'
      date: 'Available on request'
      quote: '"The AFS Group team adapted to our event''s requirements each night — their familiarity with the venue and their rapid communication between teams made crowd management seamless across the full season."'
      cta_label: 'Request reference →'
      cta_href: '/contact/'

case_studies:
  label: 'Operational Experience'
  title: 'Case Studies'
  view_link: { label: 'View Event Solutions →', href: '/event-solutions/' }
  cards:
    - label: 'Case Study · Public Festival Security'
      title: 'Vivid Sydney — Festival Security & Crowd Management'
      text: "One of Australia's largest public events, attracting over 3 million visitors across 23 nights. AFS Group provided crowd management, access control and VIP guest services across multiple Sydney precincts."
      href: '/articles/vivid-sydney/'
      cta: 'Read case study →'
    - label: 'Case Study · Venue Security Program'
      title: 'Carriageworks — Multi-Event Venue Security Program'
      text: "Carriageworks in Sydney's Eveleigh hosts major arts, cultural and commercial events year-round. AFS Group has delivered ongoing event security across multiple productions — arts, fashion, food markets and corporate functions."
      href: '/articles/carriageworks/'
      cta: 'Read case study →'
    - label: 'Case Study · Corporate Travel'
      title: 'International Sporting Delegation — Multi-City Ground Transport'
      text: 'Secure ground transport for a 40-person international sports delegation across Sydney, Melbourne and Brisbane during a major tournament — airports, venues, accommodation and team movements coordinated end-to-end.'
      cta: 'Coming Soon'
    - label: 'Case Study · Film & Television'
      title: 'Major Feature Production — On-Set Security & Talent Protection'
      text: 'Providing on-set security, talent protection and location access management for a major Australian feature production — covering principal cast, location shoots and media management over an extended production schedule.'
      cta: 'Coming Soon'

